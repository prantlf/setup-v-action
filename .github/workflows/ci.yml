name: Test or Release

on:
  push:
    branches:
      - master
    tags-ignore:
      - '**'
    paths-ignore:
      - '**/*.md'
      - LICENSE
  pull_request:

permissions:
  id-token: write
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: pnpm/action-setup@v6
      with:
        version: latest
    - uses: actions/setup-node@v7
      with:
        node-version: 24
        cache: 'pnpm'
        registry-url: 'https://registry.npmjs.org'
    - run: pnpm ci
    - run: npm run build
    # - run: npm test
    - uses: ./
    - uses: ./
      with:
        use-cache: false
        force-build: true
        install-dependencies: false

  macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v7
    - uses: pnpm/action-setup@v6
      with:
        version: latest
    - uses: actions/setup-node@v7
      with:
        node-version: 24
        cache: 'pnpm'
        registry-url: 'https://registry.npmjs.org'
    - run: pnpm ci
    - run: npm run build
    - run: npm test
    - uses: ./
    - uses: ./
      with:
        use-cache: false
        force-build: true
        install-dependencies: false

  windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v7
    - uses: pnpm/action-setup@v6
      with:
        version: latest
    - uses: actions/setup-node@v7
      with:
        node-version: 24
        cache: 'pnpm'
        registry-url: 'https://registry.npmjs.org'
    - run: pnpm ci
    - run: npm run build
    # - run: npm test
    - uses: ./
    # - uses: ./
    #   with:
    #     use-cache: false
    #     force-build: true
    #     install-dependencies: false

  release:
    if: ${{ github.ref_name == 'master' }}
    needs:
      - linux
      - macos
      - windows
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: pnpm/action-setup@v6
      with:
        version: latest
    - uses: actions/setup-node@v7
      with:
        node-version: 24
        cache: 'pnpm'
        registry-url: 'https://registry.npmjs.org'
    - run: pnpm ci
    - uses: prantlf/publish-release-action@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
